# ko_grammatical_roles.yaml
# Korean Grammatical Roles Configuration

role_hierarchy:
  # Verb hierarchy
  auxiliary_verb: "verb"
  honorific_verb: "verb"
  humble_verb: "verb"
  passive_verb: "verb"
  causative_verb: "verb"

  # Adjective hierarchy (Korean adjectives conjugate like verbs)
  descriptive_verb: "adjective"

  # Particle hierarchy
  topic_marker: "particle"
  subject_marker: "particle"
  object_marker: "particle"
  honorific_particle: "particle"
  possessive_particle: "particle"
  locative_particle: "particle"
  instrumental_particle: "particle"
  comitative_particle: "particle"

  # Ending hierarchy
  connective_ending: "ending"
  sentence_final_ending: "ending"
  nominalizer: "ending"
  quotative: "ending"

complexity_filters:
  beginner:
    - noun
    - verb
    - adjective
    - adverb
    - particle
    - copula
    - conjunction
    - pronoun

  intermediate:
    - noun
    - verb
    - auxiliary_verb
    - adjective
    - adverb
    - particle
    - topic_marker
    - subject_marker
    - object_marker
    - locative_particle
    - copula
    - counter
    - conjunction
    - pronoun
    - connective_ending

  advanced:
    - noun
    - verb
    - auxiliary_verb
    - honorific_verb
    - humble_verb
    - passive_verb
    - causative_verb
    - adjective
    - descriptive_verb
    - adverb
    - particle
    - topic_marker
    - subject_marker
    - object_marker
    - honorific_particle
    - possessive_particle
    - locative_particle
    - instrumental_particle
    - comitative_particle
    - copula
    - counter
    - conjunction
    - pronoun
    - interjection
    - connective_ending
    - sentence_final_ending
    - nominalizer
    - quotative

role_descriptions:
  noun: "Content word representing a person, place, thing, or idea (명사)"
  verb: "Word expressing action or occurrence (동사)"
  adjective: "Descriptive word that conjugates like a verb (형용사)"
  descriptive_verb: "Adjective functioning as a predicate verb (서술 형용사)"
  adverb: "Word modifying a verb, adjective, or sentence (부사)"
  particle: "Postpositional grammatical marker (조사)"
  topic_marker: "은/는 — marks the topic of the sentence (보조사)"
  subject_marker: "이/가 — marks the grammatical subject (주격 조사)"
  object_marker: "을/를 — marks the direct object (목적격 조사)"
  honorific_particle: "께서 — honorific subject marker (높임 조사)"
  possessive_particle: "의 — possessive marker (관형격 조사)"
  locative_particle: "에/에서 — location marker (부사격 조사)"
  instrumental_particle: "로/으로 — means/direction marker (부사격 조사)"
  comitative_particle: "와/과/하고 — and/with (접속 조사)"
  copula: "이다/입니다 — linking verb 'to be' (서술격 조사)"
  auxiliary_verb: "Verbal suffix adding grammatical meaning (보조 동사)"
  conjunction: "Word connecting clauses or sentences (접속사)"
  counter: "Counter/classifier used with numbers (단위 명사)"
  pronoun: "Word replacing a noun (대명사)"
  honorific_verb: "Verb form showing respect to the subject (존경어)"
  humble_verb: "Verb form lowering the speaker's actions (겸양어)"
  passive_verb: "Passive voice verb form (피동사)"
  causative_verb: "Causative voice verb form (사동사)"
  connective_ending: "Verb ending connecting clauses: -고, -서, -면 (연결 어미)"
  sentence_final_ending: "Sentence-ending form indicating mood/politeness (종결 어미)"
  nominalizer: "Suffix turning a verb into a noun: -기, -음 (명사화 접미사)"
  quotative: "Indirect speech marker: -고 하다 (인용 조사)"
  interjection: "Exclamatory word (감탄사)"
