    display_name: "Relative Pronoun"
    color: "#9370DB"
    description: "Introduces relative clause (who, whom, which, that, whose). 'The man who arrived' vs. 'The man that arrived'."
  subordinating_conjunction:
    display_name: "Subordinating Conjunction"
    color: "#888888"
    description: "Introduces dependent clause (because, although, if, when, unless, while, as, until). Changes word order in some languages."
  coordinating_conjunction:
    display_name: "Coordinating Conjunction"
    color: "#AAAAAA"
    description: "Joins equal elements (FANBOYS: for, and, nor, but, or, yet, so). Can start sentences in modern English."
  interrogative_pronoun:
    display_name: "Interrogative Pronoun"
    color: "#9370DB"
    description: "Asks questions (who, what, which, whose, whom). Moves to sentence-initial position in English questions."
  reflexive_pronoun:
    display_name: "Reflexive Pronoun"
    color: "#DDA0DD"
    description: "Pronoun reflecting back to subject (myself, yourself, himself, herself, itself, ourselves, themselves). Requires same-subject antecedent."
  indefinite_pronoun:
    display_name: "Indefinite Pronoun"
    color: "#8B7EC8"
    description: "Non-specific pronoun (someone, anyone, everyone, something, anything, nothing, each, either, neither, all, both, few, many, most, some)."
  comparative:
    display_name: "Comparative"
    color: "#FF44FF"
    description: "Comparative form of adjective/adverb (-er for short words, more for long: bigger, more beautiful). Paired with 'than'."
  superlative:
    display_name: "Superlative"
    color: "#FF44FF"
    description: "Superlative form (-est for short, most for long: biggest, most beautiful). Usually with 'the'."
  phrasal_verb:
    display_name: "Phrasal Verb"
    color: "#20B2AA"
    description: "Verb + particle with non-compositional meaning (put up, give up, turn down). Frequently separable (put the fire out / put out the fire)."
  interjection:
    display_name: "Interjection"
    color: "#FF69B4"
    description: "Exclamatory word expressing emotion (oh, wow, yes, hello, alas). Often punctuated separately."
